# Spring Boot Application Settings
spring.application.name=ai-placement-prep-agent
server.port=8080

# MongoDB Atlas Integration Setup
# Replace <username>, <password>, and <cluster-url> with your Atlas connection details
spring.data.mongodb.uri=mongodb+srv://<username>:<password>@<cluster-url>/placement_db?retryWrites=true&w=majority

# Google Gemini AI Config
# In production, recommend passing this as an environment variable: GEMINI_API_KEY
gemini.api.key=YOUR_GOOGLE_GEMINI_API_KEY_HERE

# Log levels
logging.level.com.placement.agent=INFO
logging.level.org.springframework.data.mongodb=DEBUG
